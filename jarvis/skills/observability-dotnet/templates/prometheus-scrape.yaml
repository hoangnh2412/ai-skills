# Prometheus scrape job — OTEL collector (mẫu)
# Thay targets, labels theo môi trường thực tế.

scrape_configs:
  - job_name: otel-collector
    scrape_interval: 15s
    static_configs:
      - targets:
          - otel-collector:8889   # Prometheus exporter port trên collector
    # metric_relabel_configs:     # tùy cluster — giữ service_name từ OTEL

  # Hoặc scrape trực tiếp app (nếu expose /metrics):
  # - job_name: '{service_name}-api'
  #   static_configs:
  #     - targets:
  #         - app-host:9464
